appId: com.paiban.electron
productName: 班
compression: store
directories:
  output: release/${version}
files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
artifactName: ban-${version}-green.${ext}
portable:
  artifactName: ban-${version}-portable.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ban-${version}-setup.${ext}
win:
  icon: resources/icon.ico
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
